name: kafka-automation

# 1. Define Common Service Settings (Image, Networks)
x-service-common: &service-common
  image: apache/kafka:latest
  networks:
    - kafka-net

# 2. Define Common Kafka Environment Settings
x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_NUM_PARTITIONS: 3
  CLUSTER_ID: "Mk3OEYBSQ9uFH_5Jt4vkgA"
  KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-lab
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - kafka-net
    restart: unless-stopped

  broker-1:
    <<: *service-common
    container_name: broker-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:19092,EXTERNAL://localhost:9092
    volumes:
      - broker-1-data:/var/lib/kafka/data

  broker-2:
    <<: *service-common
    container_name: broker-2
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-2:19092,EXTERNAL://localhost:9094
    volumes:
      - broker-2-data:/var/lib/kafka/data

  broker-3:
    <<: *service-common
    container_name: broker-3
    ports:
      - "9096:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-3:19092,EXTERNAL://localhost:9096
    volumes:
      - broker-3-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: apache-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:19092,broker-2:19092,broker-3:19092
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    networks:
      - kafka-net

volumes:
  jenkins_home:
  broker-1-data:
  broker-2-data:
  broker-3-data:

networks:
  kafka-net:
    driver: bridge